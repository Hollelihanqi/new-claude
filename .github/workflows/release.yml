name: release

# 推送形如 v1.0.0 的 tag 时触发；也可在 Actions 页面手动运行
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # 发版前先跑测试：不通过就不构建、不发布，避免 auto-updater 把未测试的包推给全体用户
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
      - name: 缓存 cargo 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile
      # 构建含 tsc 类型检查，并产出 cargo test 编译所需的 dist/
      - name: 前端类型检查并构建
        run: pnpm build
      - name: Rust 单元测试
        working-directory: src-tauri
        run: cargo test

  build:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 检查 tag 与项目版本一致
        shell: bash
        run: |
          node -e "const fs=require('fs');const tag=process.env.TAG.replace(/^v/,'');const p=require('./package.json').version;const t=require('./src-tauri/tauri.conf.json').version;const c=fs.readFileSync('src-tauri/Cargo.toml','utf8').match(/^version = \"([^\"]+)\"/m)?.[1];if(tag!==p||p!==t||p!==c){console.error({tag,package:p,tauri:t,cargo:c});process.exit(1)}"
        env:
          TAG: ${{ github.ref_name }}

      - name: 构建并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Claude 管理中心 ${{ github.ref_name }}"
          releaseBody: "下载对应你系统的安装包：macOS 用 .dmg，Windows 用 .msi 或 .exe。首次打开若有安全提示，见仓库 README 的『同事如何安装』。"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

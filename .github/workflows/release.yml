name: release

# 推送形如 v1.0.0 的 tag 时触发；也可在 Actions 页面手动运行
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: 安装前端依赖
        run: npm install

      - name: 用 tag 同步版本号
        shell: bash
        run: |
          node -e "const f='src-tauri/tauri.conf.json';const c=require('./'+f);c.version=process.env.TAG.replace(/^v/,'');require('fs').writeFileSync(f,JSON.stringify(c,null,2))"
        env:
          TAG: ${{ github.ref_name }}

      - name: 构建并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Claude Code 配置工具 ${{ github.ref_name }}"
          releaseBody: "下载对应你系统的安装包：macOS 用 .dmg，Windows 用 .msi 或 .exe。首次打开若有安全提示，见仓库 README 的『同事如何安装』。"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
